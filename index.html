<!DOCTYPE html>
<html lang="en">

<head>
  <title>Oil & Gas GIS</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<!-- Leaflet Marker Cluster 
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  -->

<!-- local CSS-->
  <link rel="stylesheet" href="/css/style.css" />

</head>

<body>
<!-- HEADER -->
<header>
  <div class="header-left">
    <i class="fa-solid fa-map-location-dot"></i>
    <h1>Netherland – Oil 🛢️ &amp; Gas ⛽ Boreholes</h1>
  </div>

  <div class="header-right">
    <a href="https://github.com/hcoco1" target="_blank">
      <i class="fa-brands fa-github"></i>
    </a>

    <a href="https://www.linkedin.com/in/hcoco1" target="_blank">
      <i class="fa-brands fa-linkedin"></i>
    </a>

    <a href="https://www.hcoco1.com" target="_blank">
  <img src="img/profile.jpg" alt="profile" />
</a>
  </div>
</header>


<div id="controlPanel">

  <div id="boreholesControls">
<b>Filter Boreholes</b> 
    <div class="panel-row">
      <label>👉</label>
      <select id="statusFilter">
        <option value="">All</option>
        <option value="Active">Active</option>
        <option value="Abandoned">Abandoned</option>
        <option value="Suspended">Suspended</option>
      </select>
    </div>

    <div class="panel-row">
      <b>Status:</b> <span id="uiStatus">All</span>
    </div>

    <div class="panel-row">
      <b>Quantity:</b> <span id="uiCount">-</span>
    </div>

    <div class="panel-section">

  <b>Legend</b>

  <div class="legend-item">
    <span class="legend-color" style="background:#16a34a;"></span>
    Active
  </div>

  <div class="legend-item">
    <span class="legend-color" style="background:#dc2626;"></span>
    Abandoned
  </div>

  <div class="legend-item">
    <span class="legend-color" style="background:#f59e0b;"></span>
    Suspended
  </div>

  <div class="legend-item">
    <span class="legend-color" style="background:#2563eb;"></span>
    Other
  </div>

</div>

  </div>

  <!-- LOADING -->
  <div id="loadingIndicator"><i class="fa-solid fa-spinner"></i>  Loading...</div>

</div>








</div>


<div id="map"></div>








<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Font Awesome JS -->
<script src="https://kit.fontawesome.com/8d96376049.js" crossorigin="anonymous"></script>

<!-- Local JS -->
<script type="module" src="js/main.js"></script>

</body>

</html>
